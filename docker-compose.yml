services:
  agent-dispatcher-web:
    build: .
    container_name: agent-dispatcher-web
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - /run/agent-dispatcher:/run/agent-dispatcher
    environment:
      AC_UNIX_SOCKET: /run/agent-dispatcher/dispatcher.sock
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
